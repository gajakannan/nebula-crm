name: Pact Contract Verification

on:
  pull_request:
    paths:
      - 'experience/tests/contracts/**'
      - 'engine/tests/Nebula.Tests/Contracts/**'
      - 'experience/pacts/**'
  workflow_dispatch:

jobs:
  consumer-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm --dir experience install --frozen-lockfile

      - name: Generate consumer pact
        run: pnpm --dir experience test:contracts

      - name: Upload pact file
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: experience/pacts/

  provider-verification:
    runs-on: ubuntu-latest
    needs: consumer-contract
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nebula
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download pact file
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: experience/pacts/

      - name: Run provider verification
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5433;Database=nebula;Username=postgres;Password=postgres
          ASPNETCORE_ENVIRONMENT: Development
        run: |
          dotnet test engine/tests/Nebula.Tests/Nebula.Tests.csproj \
            --filter "FullyQualifiedName~BrokerListProviderPactTests" \
            --logger "console;verbosity=normal"
