version: 1
release_posture:
  mode: public-preview-human-orchestrated
  summary: 'Phase B approved (2026-02-14). F0001, F0002, F0003, F0004, F0005,
    F0009, F0012, F0013, and F0015 are completed and archived. F0014 (DevOps
    Smoke Test Automation) is the active implementation feature. F0010 and F0011
    are abandoned (superseded by F0013). CI enforces strict infra and security
    gates at this stage.

    '
current_stage: implementation
implementation_scope:
  active_feature: F0014-devops-smoke-test-automation
  active_stories:
  - F0014-S0001
  note: "F0014 remains active pending feature closeout/archive. F0004 was archived\
    \ on 2026-03-23."
stages:
  framework-bootstrap:
    description: Framework scaffolding phase before solution implementation starts
      (active stage for the initial public preview).
    required_gates:
    - boundary_genericness
    - skill_regression
    - infra_non_strict
  planning:
    description: Planning artifacts are being authored; implementation remains placeholder.
    required_gates:
    - boundary_genericness
    - api_contract
    - solution_contract
    - infra_non_strict
    - security_planning_light
  implementation:
    description: Application code/runtime is being built; strict operational/security
      gates apply.
    required_gates:
    - boundary_genericness
    - api_contract
    - solution_contract
    - frontend_quality
    - infra_strict
    - security_planning_strict
  release-readiness:
    description: Public release hardening stage with strict gates and review evidence.
    required_gates:
    - boundary_genericness
    - api_contract
    - solution_contract
    - frontend_quality
    - infra_strict
    - security_planning_strict
gates:
  boundary_genericness:
    description: Prevent solution-specific leakage into generic framework agents.
    command:
    - python3
    - agents/scripts/validate-genericness.py
  skill_regression:
    description: Validate skill metadata, structure quality, and routing regressions.
    command:
    - python3
    - agents/scripts/run-skill-regression.py
  api_contract:
    description: Validate OpenAPI structural and canonical error-contract rules.
    command:
    - python3
    - agents/architect/scripts/validate-api-contract.py
    - planning-mds/api/nebula-api.yaml
  solution_contract:
    description: Validate solution-specific story/API contract alignment.
    command:
    - python3
    - planning-mds/testing/validate-nebula-api-contract.py
    - planning-mds/api/nebula-api.yaml
  frontend_quality:
    description: Enforce solution-owned frontend validation evidence and coverage artifacts.
    command:
    - python3
    - planning-mds/testing/validate-frontend-quality-gate.py
    - planning-mds/operations/evidence/frontend-quality/latest-run.json
  infra_non_strict:
    description: Informational infrastructure baseline checks during bootstrap/planning.
    command:
    - python3
    - agents/devops/scripts/validate-infrastructure.py
    - .
  infra_strict:
    description: Strict infrastructure gate for implementation/release stages.
    command:
    - python3
    - agents/devops/scripts/validate-infrastructure.py
    - .
    - --strict
  security_planning_light:
    description: Ensure required security planning artifacts exist.
    command:
    - python3
    - agents/security/scripts/security-audit.py
    - planning-mds/security
  security_planning_strict:
    description: Enforce non-draft security artifacts and dated review evidence.
    command:
    - python3
    - agents/security/scripts/security-audit.py
    - planning-mds/security
    - --strict
